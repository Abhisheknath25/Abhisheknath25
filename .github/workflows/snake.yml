name: generate pacman animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Abhisheknath25
          outputs: |
            dist/pacman.svg?palette=github-dark&color_snake=#FFE81F&color_dots=#FF4D4D&color_empty=#000000
            dist/pacman-glow.svg?palette=github-dark&color_snake=#FFFF00&color_dots=#00FFFF&color_empty=#000000

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
